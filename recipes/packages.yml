---
# yaml-language-server: $schema=https://schema.blue-build.org/module-list-v1.json

modules:
  - type: script
    snippets:
      - dnf5 install -y --nogpgcheck --repofrompath 'terra,https://repos.fyralabs.com/terra$releasever' terra-release terra-gpg-keys

  - type: dnf
    repos:
      cleanup: true
      copr: 
        - tarulia/obs-studio-plugins
      files: 
        - https://brave-browser-rpm-release.s3.brave.com/brave-browser.repo
        - vscode.repo
      keys:
        - https://packages.microsoft.com/keys/microsoft.asc
    install:
      packages:
        - bat
        - btop
        - jq
        - asusctl
        - asusctl-rog-gui
        - ScopeBuddy
        - steam
        - steam-devices
        - brave-origin
        - discord
        - obs-studio
        - obs-studio-plugin-text-pthread
        - obs-studio-plugin-tuna
        - obs-studio-plugin-pipewire-audio-capture
        - dmemcg-booster
        - plasma-foreground-booster-dmemcg
        - qbittorrent
        - code
    remove:
      packages:
        - firefox
        - firefox-langpacks

