---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
# image will be published to ghcr.io/<user>/<name>
name: hoxi-kinoite
# description will be included in the image's metadata
description: This is my personal OS image.

# the base image to build on top of (FROM) and the version tag to use
base-image: ghcr.io/blue-build/base-images/fedora-kinoite
image-version: 44 # latest is also supported if you want new updates ASAP

# module configuration, executed in order
# you can include multiple instances of the same module
modules:
  - type: files
    files:
      - source: system
        destination: / # copies files/system/* (* means everything inside it) into your image's root folder /

  - type: dnf
    repos:
      copr:
        - atim/starship
    install:
      packages:
        - micro
        - starship
    remove:
      packages:
        # example: removing firefox (in favor of the flatpak)
        # "firefox" is the main package, "firefox-langpacks" is a dependency
        - firefox
        - firefox-langpacks # also remove firefox dependency (not required for all packages, this is a special case)

  - type: default-flatpaks
    configurations:
      - notify: true # Send notification after install/uninstall is finished (true/false)
        scope: system
        # If no repo information is specified, Flathub will be used by default
        install: # system flatpaks we want all users to have and not remove
          - org.mozilla.firefox
          - org.gnome.Loupe
      - scope: user # Also add Flathub user repo, but no user packages

  # 1. CachyOS kernel COPR + negativo17 nonfree repo
  - type: dnf
    repos:
      copr:
        - bieszczaders/kernel-cachyos
      files:
        - https://negativo17.org/repos/fedora-nvidia.repo

  - type: rpm-ostree
    remove:
      - kernel
      - kernel-core
      - kernel-modules
      - kernel-modules-core
      - kernel-modules-extra
    install:
      - kernel-cachyos
      - kernel-cachyos-devel-matched
 
  # 3. Driver + gaming (32-bit multilib, Wayland, VA-API) + dev (CUDA, container toolkit)
  - type: dnf
    install:
      packages:
        - nvidia-driver
        - nvidia-driver-libs.i686
        - nvidia-driver-cuda-libs.i686
        - nvidia-settings
        - akmod-nvidia
        - egl-wayland
        - libva-nvidia-driver
        # gaming: 32-bit mesa for Proton/Steam
        - mesa-dri-drivers.i686
        - mesa-filesystem.i686
        - mesa-libEGL.i686
        - mesa-libGL.i686
        - mesa-libgbm.i686
        - mesa-vulkan-drivers.i686
        # dev: CUDA + container GPU passthrough
        - nvidia-driver-cuda
        - nvidia-driver-cuda-libs
        - nvidia-container-toolkit
      exclude:
        - cachyos-settings   # file conflict with negativo17's nvidia-kmod-common

  # 4. Force the akmod build during image build
  - type: script
    snippets:
      - akmods --force --kernels "$(rpm -q --queryformat '%{VERSION}-%{RELEASE}.%{ARCH}\n' kernel-cachyos)"
      - depmod -a
      # version sanity check, same guard ublue's script uses
      - |
        KMOD_VERSION="$(rpm -q --queryformat '%{VERSION}' kmod-nvidia)"
        DRIVER_VERSION="$(rpm -q --queryformat '%{VERSION}' nvidia-driver)"
        if [ "$KMOD_VERSION" != "$DRIVER_VERSION" ]; then
          echo "Error: kmod-nvidia ($KMOD_VERSION) != nvidia-driver ($DRIVER_VERSION)"
          exit 1
        fi

  # 5. The dracut fixes from ublue's script: force-load + preload iGPU alongside nvidia
  - type: script
    snippets:
      - sed -i 's@omit_drivers@force_drivers@g' /usr/lib/dracut/dracut.conf.d/99-nvidia.conf
      - sed -i 's@ nvidia @ i915 amdgpu nvidia @g' /usr/lib/dracut/dracut.conf.d/99-nvidia.conf

  # 6. Container GPU passthrough: SELinux policy + CDI generation at boot
  - type: script
    snippets:
      - semodule --verbose --install /usr/share/selinux/packages/nvidia-container.pp
  - type: files
    files:
      - usr: usr  # copies files/usr/lib/systemd/system/nvidia-cdi-generate.service into the image

  - type: script
    snippets:
      - systemctl enable nvidia-cdi-generate.service

  - type: kargs
    kargs:
      - rd.driver.blacklist=nouveau
      - modprobe.blacklist=nouveau
      - nvidia-drm.modeset=1

  - type: signing # this sets up the proper policy & signing files for signed images to work fully
