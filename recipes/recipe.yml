---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
# image will be published to ghcr.io/<user>/<name>
name: hoxi-kinoite
# description will be included in the image's metadata
description: This is my personal OS image.

# the base image to build on top of (FROM) and the version tag to use
base-image: ghcr.io/blue-build/base-images/fedora-kinoite
image-version: 44 # latest is also supported if you want new updates ASAP

# module configuration, executed in order
# you can include multiple instances of the same module
modules:
  - type: files
    files:
      - source: system
        destination: / # copies files/system/* (* means everything inside it) into your image's root folder /

  - type: dnf
    repos:
      copr:
        - atim/starship
    install:
      packages:
        - micro
        - starship
    remove:
      packages:
        # example: removing firefox (in favor of the flatpak)
        # "firefox" is the main package, "firefox-langpacks" is a dependency
        - firefox
        - firefox-langpacks # also remove firefox dependency (not required for all packages, this is a special case)

  - type: default-flatpaks
    configurations:
      - notify: true # Send notification after install/uninstall is finished (true/false)
        scope: system
        # If no repo information is specified, Flathub will be used by default
        install: # system flatpaks we want all users to have and not remove
          - org.mozilla.firefox
          - org.gnome.Loupe
      - scope: user # Also add Flathub user repo, but no user packages

  # 1. CachyOS kernel COPR + negativo17 nonfree repo
  - type: dnf
    repos:
      copr:
        - bieszczaders/kernel-cachyos
      files:
        - https://negativo17.org/repos/fedora-nvidia.repo
        - https://nvidia.github.io/libnvidia-container/stable/rpm/nvidia-container-toolkit.repo

  - type: script
    snippets:
      - dnf -y config-manager setopt install_weak_deps=False
      - dnf -y config-manager setopt tsflags=noscripts # Prevents postinstall scripts from running (and failing the build)

  - type: dnf
    remove:
      packages:
        - kernel
        - kernel-core
        - kernel-modules
        - kernel-modules-core
        - kernel-modules-extra

  - type: script
    snippets:
      - rm -r -f /usr/lib/modules/*

  - type: dnf
    install:
      packages:
        - kernel-cachyos
        - kernel-cachyos-devel-matched


 
  # 3. Driver + gaming (32-bit multilib, Wayland, VA-API) + dev (CUDA, container toolkit)
  - type: dnf
    install:
      packages:
        - nvidia-driver
        - nvidia-driver-libs.i686
        - nvidia-driver-cuda-libs.i686
        - nvidia-settings
        - akmod-nvidia
        - egl-wayland
        - libva-nvidia-driver
        # dev: CUDA + container GPU passthrough
        - nvidia-driver-cuda
        - nvidia-driver-cuda-libs
        - nvidia-container-toolkit
        - nvidia-container-toolkit-base
        - libnvidia-container-tools
        - libnvidia-container1
      exclude:
        - cachyos-settings

  - type: script
    snippets:
      - dnf5 install -y --disablerepo='fedora-nvidia*' mesa-dri-drivers.i686 mesa-filesystem.i686 mesa-libEGL.i686 mesa-libGL.i686 mesa-libgbm.i686 mesa-vulkan-drivers.i686

  - type: script
    snippets:
      - VER=$(basename /usr/lib/modules/*) &&
        akmods --force --kernels $VER &&
        dnf5 install -y /var/cache/akmods/nvidia/kmod-nvidia-*.rpm &&
        depmod -a $VER &&
        DRACUT_NO_XATTR=1 &&
        dracut --kver $VER --force --add ostree --no-hostonly --reproducible /usr/lib/modules/$VER/initramfs.img

  # 5. The dracut fixes from ublue's script: force-load + preload iGPU alongside nvidia
  - type: script
    snippets:
      - sed -i 's@omit_drivers@force_drivers@g' /usr/lib/dracut/dracut.conf.d/99-nvidia.conf
      - sed -i 's@ nvidia @ i915 amdgpu nvidia @g' /usr/lib/dracut/dracut.conf.d/99-nvidia.conf

  - type: script
    snippets:
      - semodule --verbose --install /usr/share/selinux/packages/nvidia-container.pp

  - type: script
    snippets:
      - systemctl enable nvidia-cdi-generate.service
      - dnf -y config-manager unsetopt tsflags

  - type: kargs
    kargs:
      - rd.driver.blacklist=nouveau
      - modprobe.blacklist=nouveau
      - nvidia-drm.modeset=1

  - type: signing # this sets up the proper policy & signing files for signed images to work fully
